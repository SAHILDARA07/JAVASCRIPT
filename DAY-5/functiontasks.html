<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

</head>

<body>


    <script>
        //function

        function addition(num1, num2) {
            return num1 + num2;
        }


        function Subtraction(num1, num2) {
            return num1 - num2;
        }
        function multiply(num1, num2) {

            return num1 * num2;

        }

        function division(num1, num2) {
            return num1 / num2;
        }

        const choice = 1;
        const num1 = 12;
        const num2 = 12;

        switch (choice) {
            case 1: const a = addition(num1, num2);
                console.log("Sum is ", a);
                break;
            case 2: const b = Subtraction(num1, num2);
                console.log("Subtraction is ", b);
                break;
            case 3: const c = multiply(num1, num2);
                console.log("multiplication is ", c);
                break;
            case 4: const d = division(num1, num2);
                console.log("division is ", d);
                break;
        }
    </script>
</body>

</html>
