<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body style="height: 100vh;">
    <div class="container h-100 d-flex flex-column justify-content-center align-items-center ">
        <div class="quote-box">
            <p id="quotes-text" class=" fs-1 ">"Lorem ipsum, dolor sit amet consectetur adipisicing elit. Eum rerum nemo, reiciendis atque error minus!"</p>
             <p id="author-text" class="fs-4">-Lorem, ipsum dolor.</p>
        </div>
        <div>
            <button id="btn-prev" class="btn btn-primary">Previous</button>
            <button id="btn-like" class="btn btn-primary">Like</button>
            <button id="btn-next" class="btn btn-primary">Next</button>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
