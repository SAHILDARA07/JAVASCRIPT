<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pro Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; min-height: 100vh; display: flex; align-items: center; }
        .quiz-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .option-btn { transition: all 0.2s; cursor: pointer; border: 2px solid #f0f0f0; }
        .option-btn:hover { border-color: #0d6efd; background-color: #f8f9ff; }
        .selected { border-color: #0d6efd !important; background-color: #e7f1ff !important; font-weight: bold; }
        #timer-circle { width: 60px; height: 60px; border-radius: 50%; border: 4px solid #0d6efd; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div id="quiz-container" class="card quiz-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="text-muted" id="question-index">Question 1/10</h5>
                    <div id="timer-circle" class="fw-bold text-primary">10</div>
                </div>

                <div class="progress mb-4" style="height: 10px;">
                    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                </div>

                <h3 id="question-text" class="mb-4">Loading question...</h3>

                <div id="options-group">
                    <div class="option-btn p-3 mb-2 rounded shadow-sm" data-ans="a" id="opt-a"></div>
                    <div class="option-btn p-3 mb-2 rounded shadow-sm" data-ans="b" id="opt-b"></div>
                    <div class="option-btn p-3 mb-2 rounded shadow-sm" data-ans="c" id="opt-c"></div>
                    <div class="option-btn p-3 mb-2 rounded shadow-sm" data-ans="d" id="opt-d"></div>
                </div>

                <div class="mt-4 text-end">
                    <button id="next-button" class="btn btn-primary btn-lg px-5 disabled">Next</button>
                </div>
            </div>

            <div id="result-container" class="card quiz-card p-4 d-none text-center">
                <h2 class="display-5 mb-3">Quiz Finished!</h2>
                <div class="display-1 fw-bold text-primary mb-3
